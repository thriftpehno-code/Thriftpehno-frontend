<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>
</head>

<body style="background:black; color:white; font-family:Arial; padding:20px;">

<a href="admin.html" class="admin-btn">Admin</a>
  
<h1>Admin Panel</h1>

<input id="password" type="password" placeholder="Enter password"><br><br>

<div id="adminContent" style="display:none;">

  <input id="name" placeholder="Product Name"><br><br>
  <input id="price" placeholder="Price"><br><br>
  <input id="size" placeholder="Size"><br><br>
  <input id="category" placeholder="Category"><br><br>

  <textarea id="images" placeholder='Paste image JSON here'></textarea><br><br>

  <button onclick="addProduct()">Add Product</button>

  <style>
.admin-btn {
  position: fixed;
  top: 20px;
  right: 20px;
  border: 1px solid white;
  padding: 8px 15px;
  color: white;
  text-decoration: none;
  font-size: 12px;
  z-index: 999;
}
</style>
  
</div>

<script>

const ADMIN_PASSWORD = "1234"; // change later

document.getElementById("password").addEventListener("input", (e) => {
  if (e.target.value === ADMIN_PASSWORD) {
    document.getElementById("adminContent").style.display = "block";
  }
});

const SUPABASE_URL = "https://tyvbwwccwcgkafueroui.supabase.co";
const SUPABASE_KEY = "sb_publishable_tKeUN6N774CqR8YucuDwSw_U35gepAu";

async function addProduct() {

  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;
  const size = document.getElementById("size").value;
  const category = document.getElementById("category").value;
  const images = document.getElementById("images").value;

  const response = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({
      name,
      price,
      size,
      category,
      images
    })
  });

  if (response.ok) {
    alert("Product added!");
  } else {
    alert("Error adding product");
  }
}

</script>

</body>
</html>
