<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      padding: 20px;
    }

    .admin-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      border: 1px solid white;
      padding: 8px 15px;
      color: white;
      text-decoration: none;
      font-size: 12px;
      z-index: 999;
    }
     input, textarea {
    display: block;
    margin-bottom: 15px;
    width: 300px;
    padding: 8px;
  }
  </style>

</head>

<body>

<h1>Admin Panel</h1>

<input id="password" type="password" placeholder="Enter password"><br><br>

<div id="adminContent" style="display:none;">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">
<input id="size" placeholder="Size">
<input id="category" placeholder="Category">

<textarea id="images" placeholder="Paste one image link per line"></textarea>

 <button onclick="addProduct()" style="margin-top:10px;">Add Product</button>

</div>

<script>

const ADMIN_PASSWORD = "1234";

document.getElementById("password").addEventListener("input", (e) => {
  if (e.target.value === ADMIN_PASSWORD) {
    document.getElementById("adminContent").style.display = "block";
  }
});

const SUPABASE_URL = "https://tyvbwwccwcgkafueroui.supabase.co";
const SUPABASE_KEY = "sb_publishable_tKeUN6N774CqR8YucuDwSw_U35gepAu";

async function addProduct() {

  const name = document.getElementById("name").value.trim();
const price = document.getElementById("price").value.trim();
const size = document.getElementById("size").value;
const category = document.getElementById("category").value;
let imagesInput = document.getElementById("images").value;

// VALIDATION (all important fields)
if (!name || !price || !category || !imagesInput) {
  alert("Fill all fields properly");
  return;
}

// CONVERT PRICE TO NUMBER
const priceNumber = Number(price);

if (isNaN(priceNumber)) {
  alert("Price must be a number");
  return;
}

// CONVERT IMAGES (lines → JSON)
let imagesArray = imagesInput
  .split("\n")
  .map(img => img.trim())
  .filter(img => img !== "");

const images = JSON.stringify(imagesArray);
  const response = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
    body: JSON.stringify({
  name,
  price: priceNumber,
  size: size.trim(),
  category: category.trim().toLowerCase(),
  images
})
  });

  if (response.ok) {
  alert("Product added!");

  // ✅ CLEAR FORM HERE
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("size").value = "";
  document.getElementById("category").value = "";
  document.getElementById("images").value = "";

} else {
  alert("Error adding product");
}
}
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") {
    addProduct();
  }
});
</script>

</body>
</html>
