<!DOCTYPE html>
<html>
<head>
  <title>Admin Panel</title>

  <style>
    body {

</head>

<body>

 <a href="index.html" class="back-btn">Back to Site</a>
<h1>Admin Panel</h1>

<input id="password" type="password" placeholder="Enter password" style="margin-bottom:15px;">

<div id="adminContent" style="display:none;">

<input id="name" placeholder="Product Name">
<input id="price" placeholder="Price">

<select id="measurement">

  <!-- Pants / Ladies -->

  <option value="32">32</option>

  <option value="34">34</option>
  <option value="35">35</option>
  <option value="36">36</option>
  <option value="37">37</option>
  <option value="38">38</option>
  <option value="39">39</option>
  <option value="40">40</option>
  <option value="41">41</option>
  <option value="42">42</option>
  <option value="43">43</option>
  <option value="44">44</option>
  <option value="45">45</option>
  <option value="46">46</option>
  <option value="47">47</option>
  <option value="48">48</option>
  <option value="49">49</option>
  <option value="50">50</option>
  <option value="51">51</option>
  <option value="52">52</option>
  <option value="53">53</option>
  <option value="54">54</option>
  <option value="55">55</option>

</select>
  
<select id="category">
  <option value="">Select Category</option>
  <option value="pants">Pants</option>
  <option value="shirts">Shirts</option>
  <option value="tshirts">T-Shirts</option>
  <option value="jackets">Jackets</option>
  <option value="activewear">Activewear</option>
  <option value="ladies">Ladies</option>
  <option value="accessories">Accessories</option>
</select>

<textarea id="images" placeholder="Paste one image link per line"></textarea>

<div id="imagePreview" style="display:flex; gap:15px; flex-wrap:wrap; margin-top:15px;"></div>
  
 <button id="addBtn" onclick="addProduct()" style="margin-top:10px;">Add Product</button>
<h2 style="margin-top:40px;">Your Products</h2>
<div id="productList"></div>

</div>

<script>

const ADMIN_PASSWORD = "1234";

// Auto unlock while typing
document.getElementById("password").addEventListener("input", (e) => {
  if (e.target.value === ADMIN_PASSWORD) {
    document.getElementById("adminContent").style.display = "block";
    loadAdminProducts();
  }
});

// Enter key support
document.getElementById("password").addEventListener("keydown", (e) => {
  if (e.key === "Enter") {

    const value = e.target.value;

    if (value === ADMIN_PASSWORD) {
      document.getElementById("adminContent").style.display = "block";
      loadAdminProducts();
    } else {
      alert("Wrong password");
    }
  }
});
  
  async function loadAdminProducts() {

  const response = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await response.json();

  const list = document.getElementById("productList");
  list.innerHTML = "";

data.forEach(product => {

  let imagesArray = [];

  try {
    if (Array.isArray(product.images)) {
      imagesArray = product.images;
    } else if (typeof product.images === "string") {
      imagesArray = JSON.parse(product.images);
    }
  } catch (e) {
    imagesArray = [];
  }

  // build images HTML
  let imagesHTML = imagesArray.map(img => `
    <img src="${img}" 
         style="width:60px; height:60px; object-fit:cover; border:1px solid white;">
  `).join("");

  list.innerHTML += `
    <div style="border:1px solid white; padding:10px; margin-bottom:10px;">
      
      <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px;">
        ${imagesHTML}
      </div>

      <p>${product.name}</p>
      <p>₹${product.price}</p>

      <button onclick="deleteProduct(${product.id})">Delete</button>

    </div>
  `;
});
async function deleteProduct(id) {

  const confirmDelete = confirm("Are you sure you want to delete this product?");

  if (!confirmDelete) return;

  await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${id}`, {
    method: "DELETE",
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  loadAdminProducts();
}

const SUPABASE_URL = "https://tyvbwwccwcgkafueroui.supabase.co";
const SUPABASE_KEY = "sb_publishable_tKeUN6N774CqR8YucuDwSw_U35gepAu";

function getActivewearSize(measurement) {

  if (measurement <= 33) return "XS";
  if (measurement <= 37) return "S";
  if (measurement <= 41) return "M";
  if (measurement <= 45) return "L";
  if (measurement <= 49) return "XL";
  if (measurement <= 53) return "XXL";
  if (measurement <= 57) return "XXXL";

  return "Unknown";
}  
  
  async function addProduct() {

const btn = document.getElementById("addBtn"); // 👈 get button
  
const name = document.getElementById("name").value.trim();
const price = document.getElementById("price").value.trim();
const category = document.getElementById("category").value;
const measurement = Number(document.getElementById("measurement").value);
  
let size = "";

if (category.toLowerCase() === "activewear") {
  size = getActivewearSize(measurement);
} else {
  size = measurement.toString(); // temporary fallback
} 
let imagesInput = document.getElementById("images").value.trim();

// VALIDATION
if (!name.trim()) {
  alert("Enter product name");
  return;
}

if (!price || isNaN(price)) {
  alert("Enter valid price");
  return;
}

if (!category) {
  alert("Select category");
  return;
}

if (!measurement || isNaN(measurement)) {
  alert("Select measurement");
  return;
}

if (!imagesInput.trim()) {
  alert("Add at least one image");
  return;
}
    
// CONVERT PRICE TO NUMBER
const priceNumber = Number(price);

// CONVERT IMAGES (lines → JSON)
let imagesArray = imagesInput
  .split("\n")
  .map(img => img.trim())
  .filter(img => img !== "");

  if (imagesArray.length === 0) {
  alert("Please add at least one image");
  return;
}

const images = JSON.stringify(imagesArray);

  btn.innerText = "Adding...";
  btn.disabled = true;

  try {
const response = await fetch(`${SUPABASE_URL}/rest/v1/products`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    },
   body: JSON.stringify({
  name,
  price: priceNumber,
  size,
  measurement,
  category: category.toLowerCase(),
  images
})
  });

  if (response.ok) {
    btn.innerText = "Added!";

  // ✅ CLEAR FORM HERE
  document.getElementById("name").value = "";
  document.getElementById("price").value = "";
  document.getElementById("measurement").value = "";
  document.getElementById("category").value = "";
  document.getElementById("images").value = "";

   document.getElementById("name").focus();
setTimeout(() => {
    btn.innerText = "Add Product";
  }, 1000);
    
} else {
  alert("Error adding product");
}
    
} catch (err) {
    console.error(err);
    alert("Something went wrong");
  }

  // 🔥 RESET BUTTON (always runs)
  btn.innerText = "Add Product";
  btn.disabled = false;
}
// ENTER KEY SUBMIT
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && document.getElementById("adminContent").style.display === "block") {
    e.preventDefault();
    addProduct();
  }
});

// LEAVE WARNING
window.addEventListener("beforeunload", function (e) {
  const name = document.getElementById("name").value;
  const price = document.getElementById("price").value;

  if (name || price) {
    e.preventDefault();
    e.returnValue = "";
  }
});
   
   
 document.addEventListener("DOMContentLoaded", function () {

  document.getElementById("password").focus();

  const imagesInput = document.getElementById("images");

  if (!imagesInput) return;


  imagesInput.addEventListener("input", function () {
    const preview = document.getElementById("imagePreview");
    const links = this.value.split("\n");

    preview.innerHTML = "";

    links.forEach((link, index) => {
      const trimmed = link.trim();
      if (!trimmed) return;

     // wrapper (needed for positioning X)
const wrapper = document.createElement("div");
wrapper.style.position = "relative";
wrapper.style.display = "inline-block";

wrapper.draggable = true;
wrapper.dataset.index = index;

wrapper.ondragstart = (e) => {
  e.dataTransfer.setData("text/plain", index);
};

wrapper.ondragover = (e) => {
  e.preventDefault();
};

wrapper.ondrop = (e) => {
  e.preventDefault();

  const fromIndex = e.dataTransfer.getData("text/plain");
  const toIndex = index;

  const arr = links.map(l => l.trim()).filter(l => l);

  const movedItem = arr.splice(fromIndex, 1)[0];
  arr.splice(toIndex, 0, movedItem);

  document.getElementById("images").value = arr.join("\n");
  document.getElementById("images").dispatchEvent(new Event("input"));
};      
// image
const img = document.createElement("img");
img.src = trimmed;

img.style.width = "300px";
img.style.height = "300px";
img.style.objectFit = "cover";
img.style.border = "1px solid white";

img.onclick = () => {
  // move clicked image to first position
  const updatedLinks = [
    trimmed,
    ...links.filter(l => l.trim() !== trimmed)
  ];

  document.getElementById("images").value = updatedLinks.join("\n");

  // refresh preview
  document.getElementById("images").dispatchEvent(new Event("input"));
};
      
// ❌ remove button
const removeBtn = document.createElement("div");
removeBtn.innerText = "✕";

removeBtn.style.position = "absolute";
removeBtn.style.top = "5px";
removeBtn.style.right = "5px";
removeBtn.style.background = "red";
removeBtn.style.color = "white";
removeBtn.style.padding = "2px 6px";
removeBtn.style.cursor = "pointer";
removeBtn.style.fontSize = "12px";
removeBtn.style.border = "1px solid red";
removeBtn.style.borderRadius = "4px";

// click remove
removeBtn.onclick = () => {
  const updatedLinks = links.filter(l => l.trim() !== trimmed);
  document.getElementById("images").value = updatedLinks.join("\n");
  document.getElementById("images").dispatchEvent(new Event("input"));
};

// assemble
wrapper.appendChild(img);
wrapper.appendChild(removeBtn);
     
const numberTag = document.createElement("div");
numberTag.innerText = index + 1;

numberTag.style.position = "absolute";
numberTag.style.top = "5px";
numberTag.style.left = "5px";
numberTag.style.background = "white";
numberTag.style.color = "black";
numberTag.style.padding = "2px 6px";
numberTag.style.fontSize = "12px";
numberTag.style.borderRadius = "4px";

wrapper.appendChild(numberTag);      
// 👇 NEW
if (index === 0) {
  const mainTag = document.createElement("div");
  mainTag.innerText = "MAIN";

  mainTag.style.position = "absolute";
  mainTag.style.bottom = "5px";
  mainTag.style.left = "5px";
  mainTag.style.background = "white";
  mainTag.style.color = "black";
  mainTag.style.padding = "2px 6px";
  mainTag.style.fontSize = "12px";
  mainTag.style.borderRadius = "4px";

  wrapper.appendChild(mainTag);
}

preview.appendChild(wrapper);   });
  });

});
</script>

</body>
</html>
