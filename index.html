<!DOCTYPE html>
<html>
<head>
  <title>Thrift Pehno</title>
</head>

<body style="margin:0; background:black; color:white; font-family:Arial, sans-serif;">

  <!-- HEADER -->
  <div style="padding:40px; text-align:center;">
    <h1 style="font-size:50px; letter-spacing:5px;">THRIFT PEHNO</h1>
    <p style="opacity:0.7;">Minimal. Clean. Timeless.</p>
  </div>

  <!-- COLLECTIONS -->
  <h2 style="text-align:center;">Collections</h2>
  
  <div style="display:flex; justify-content:center; gap:30px; flex-wrap:wrap; padding:20px;">

    <a href="pants.html" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Pants</a>
    <a href="#" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Shirts</a>
    <a href="#" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">T-Shirts</a>
    <a href="#" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Activewear</a>
    <a href="#" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Ladies</a>
    <a href="#" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Accessories</a>

  </div>

  <!-- PRODUCT GRID -->
  <div id="productGrid" style="padding:20px; display:grid; grid-template-columns: repeat(2, 1fr); gap:15px;"></div>

  <!-- SCRIPT -->
  <script>

  const products = {
    1: {
      name: "Diesel Industrial Denim",
      price: "₹2499",
      image: "https://i.postimg.cc/W1J4yxtj/1776084634437-publer-com.jpg"
    },
    2: {
      name: "Premium Pioneer Grey Denim",
      price: "₹599",
      image: "https://i.postimg.cc/HxtS95MK/1776176893297-publer-com.jpg"
    }
  };

  const grid = document.getElementById("productGrid");

  for (let id in products) {
    const product = products[id];

    grid.innerHTML += `
      <a href="pants.html?id=${id}" style="text-decoration:none; color:white;">
        <div>
          <img src="${product.image}" style="width:100%;">
          <p>${product.name}</p>
          <p>${product.price}</p>
        </div>
      </a>
    `;
  }

  </script>

</body>
</html>
