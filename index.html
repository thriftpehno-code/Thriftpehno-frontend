<body style="margin:0; background:black; color:white; font-family:Arial, sans-serif;">

<a href="#" onclick="openFilter(event, 'pants')" style="border:1px solid white; padding:20px; color:white;">Pants</a>

<div id="sizePanel" style="
  position:absolute;
  display:none;
  background:black;
  border:1px solid white;
  padding:10px;
  z-index:1000;
">
</div>
  
  <!-- PRODUCT GRID -->
  <div id="productGrid" style="padding:20px; display:grid; grid-template-columns: repeat(2, 1fr); gap:15px;"></div>

  <script>

const SUPABASE_URL = "https://tyvbwwccwcgkafueroui.supabase.co";
const SUPABASE_KEY = "sb_publishable_tKeUN6N774CqR8YucuDwSw_U35gepAu";

// GET ID FROM URL
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

async function loadProduct() {

  const response = await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${productId}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await response.json();
  const product = data[0];

  if (!product) return;

  let images = [];

  try {
    images = typeof product.images === "string"
      ? JSON.parse(product.images)
      : product.images;
  } catch {
    images = [];
  }

  const container = document.getElementById("productDetails");

  container.innerHTML = `
    <div style="max-width:800px; margin:auto;">

      ${images.map(img => `
        <img src="${img}" style="width:100%; margin-bottom:10px;">
      `).join("")}

      <h2>${product.name}</h2>
      <p>₹${product.price}</p>
      <p>Size: ${product.size || "-"}</p>

    </div>
  `;
}

loadProduct();

</script>
</body>
</html>
