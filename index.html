<!DOCTYPE html>
<html>
<head>
  <title>Thrift Pehno</title>
</head>
  
<style>
    .admin-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      border: 1px solid white;
      padding: 8px 15px;
      color: white;
      text-decoration: none;
      font-size: 12px;
      z-index: 999;
    }
  </style>
  
<body style="margin:0; background:black; color:white; font-family:Arial, sans-serif;">
<!-- update -->
<a href="admin.html" class="admin-btn">Admin</a>
  
  <!-- HEADER -->
  <div style="padding:40px; text-align:center;">
    <h1 style="font-size:50px; letter-spacing:5px;">THRIFT PEHNO</h1>
    <p style="opacity:0.7;">Minimal. Clean. Timeless.</p>
  </div>

  <!-- COLLECTIONS -->
  <h2 style="text-align:center;">Collections</h2>
  
  <div style="display:flex; justify-content:center; gap:30px; flex-wrap:wrap; padding:20px;">

<a href="?category=pants" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Pants</a>
<a href="?category=shirts" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Shirts</a>
<a href="?category=jackets" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Jackets</a>    
<a href="?category=tshirts" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">T-Shirts</a>
<a href="?category=activewear" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Activewear</a>
<a href="?category=ladies" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Ladies</a>
<a href="?category=accessories" style="border:1px solid white; padding:20px; color:white; text-decoration:none;">Accessories</a>
  </div>
  
  <!-- PRODUCT GRID -->
  <div id="productGrid" style="padding:20px; display:grid; grid-template-columns: repeat(2, 1fr); gap:15px;"></div>

  <script>

const SUPABASE_URL = "https://tyvbwwccwcgkafueroui.supabase.co";
const SUPABASE_KEY = "sb_publishable_tKeUN6N774CqR8YucuDwSw_U35gepAu";

async function loadProducts() {

const params = new URLSearchParams(window.location.search);
const category = params.get("category")?.trim().toLowerCase();

let url = `${SUPABASE_URL}/rest/v1/products`;

const response = await fetch(url, {
  headers: {
    apikey: SUPABASE_KEY,
    Authorization: `Bearer ${SUPABASE_KEY}`
  }
});
  const data = await response.json();

  const grid = document.getElementById("productGrid");

  grid.innerHTML = "";

  data.forEach(product => {
    if (category && product.category?.trim().toLowerCase() !== category) {
  return;
}
   let imgSrc = "";

 try {
  if (product.images && product.images.trim().startsWith("[")) {
    imgSrc = JSON.parse(product.images)[0];
  } else {
    imgSrc = product.images;
  }
} catch (e) {
  console.error("Bad JSON for product:", product.id, product.images);
  imgSrc = "";
}

 grid.innerHTML += `
  <a href="product.html?id=${product.id}" style="text-decoration:none; color:white;">
    <div>
      <img src="${imgSrc}" style="width:100%;">
      <p>${product.name}</p>
      <p>${product.price}</p>
      <p>Size: ${product.size || "-"}</p>
    </div>
  </a>
`;

});

}

loadProducts();

</script>

</body>
</html>
