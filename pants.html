<!DOCTYPE html>
<html>
<head>
  <title>Pants - Thrift Pehno</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 30px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      border: 1px solid white;
      padding: 20px;
    }

    .main-img {
      width: 100%;
      max-height: 500px;
      object-fit: cover;
    }

    .gallery {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin-top: 20px;
    }

    .gallery img {
      height: 100px;
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .buttons a {
      border: 1px solid white;
      padding: 8px 15px;
      color: white;
      text-decoration: none;
    }

    .back {
      text-align: center;
      margin: 30px;
    }

    .floating-cart {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      color: black;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <h1>PANTS COLLECTION</h1>

  <div class="container">

    <div class="card">

      <!-- IMAGE WITH OVERLAY -->
      <div style="position: relative;">

        <img class="main-img" src="https://i.postimg.cc/W1J4yxtj/1776084634437-publer-com.jpg">

        <!-- ADD TO CART BUTTON -->
        <div id="addToCartBtn" style="
          position: absolute;
          top: 15px;
          right: 15px;
          background: white;
          color: black;
          padding: 8px 12px;
          border-radius: 20px;
          font-size: 12px;
          cursor: pointer;
        ">
          + Cart
        </div>

      </div>

      <!-- DETAILS -->
      <h2>Diesel Industrial Denim</h2>
      <p>Price: ₹2499</p>
      <p>Size: 34-35</p>

      <!-- BUTTONS -->
      <div class="buttons">

        <a href="https://wa.me/919370820852?text=Hi%20I%20want%20to%20buy%20Diesel%20Industrial%20Denim%20(Size%2034-35)%20for%20₹2499.%20https://www.instagram.com/p/DVJdJx4DLOg/">
          Buy on WhatsApp
        </a>

        <a href="https://www.instagram.com/p/DVJdJx4DLOg/" target="_blank">
          View on Instagram
        </a>

      </div>

      <!-- GALLERY -->
      <div class="gallery">

        <img src="https://i.postimg.cc/4Nyy6Ygm/1776084635463-publer-com.jpg">
        <img src="https://i.postimg.cc/xTZCt9f5/1776084636438-publer-com.jpg">
        <img src="https://i.postimg.cc/Wby3XsNY/1776084637448-publer-com.jpg">
        <img src="https://i.postimg.cc/65qqr8X6/1776084638440-publer-com.jpg">
        <img src="https://i.postimg.cc/J7PtHb9t/1776084639442-publer-com.jpg">

      </div>

    </div>

  </div>

  <div class="back">
    <a href="index.html" style="color:white;">← Back to Home</a>
  </div>

  <!-- FLOATING CART -->
  <div id="cartBtn" class="floating-cart">
    Cart (0) 🛒
  </div>

  <!-- SCRIPT -->
 <script>
  let cart = [];

  const addBtn = document.getElementById("addToCartBtn");
  const cartBtn = document.getElementById("cartBtn");

  const product = {
    id: "diesel-denim-1",
    name: "Diesel Industrial Denim",
    price: "₹2499",
    size: "34-35"
  };

  addBtn.addEventListener("click", () => {

    // check if already added
    const alreadyAdded = cart.find(item => item.id === product.id);

    if (alreadyAdded) {
      alert("Already added to cart");
      return;
    }

    // add product
    cart.push(product);

    // update cart count
    cartBtn.innerText = "Cart (" + cart.length + ") 🛒";

    // change button UI
    addBtn.innerText = "Added ✓";
    addBtn.style.background = "green";
    addBtn.style.color = "white";
    addBtn.style.cursor = "not-allowed";

  });

  // show cart
  cartBtn.addEventListener("click", () => {

    if (cart.length === 0) {
      alert("Cart is empty");
      return;
    }

    let message = "Your Cart:\n\n";

    cart.forEach(item => {
      message += item.name + " - " + item.price + " (Size " + item.size + ")\n";
    });

    alert(message);
  });
</script>
</body>
</html>
