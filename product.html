}

<img id="mainImage" class="main-img" src="">

  <!-- SCRIPT -->
<script>

const SUPABASE_URL = "https://tyvbwwccwcgkafueroui.supabase.co";
const SUPABASE_KEY = "sb_publishable_tKeUN6N774CqR8YucuDwSw_U35gepAu";

async function loadProduct() {

  const params = new URLSearchParams(window.location.search);
  const productId = params.get("id");

  const response = await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${productId}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

  const data = await response.json();
  const product = data[0];

  // SET DATA
  document.getElementById("productName").innerText = product.name;
  document.getElementById("productPrice").innerText = "Price: " + product.price;
  document.getElementById("productSize").innerText = "Size: " + product.size;

  document.getElementById("mainImage").src = product.images;

}

loadProduct();

</script>
