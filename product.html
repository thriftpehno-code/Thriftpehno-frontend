<!DOCTYPE html>
<html>
<head>
 <title>Product - Thrift Pehno</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 30px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      border: 1px solid white;
      padding: 20px;
    }

    .main-img {
  width: 100%;
  aspect-ratio: 4 / 5;
  object-fit: contain;
  background: black;
}

    .gallery {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin-top: 20px;
    }

    .gallery img {
      height: 100px;
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .buttons a {
      border: 1px solid white;
      padding: 8px 15px;
      color: white;
      text-decoration: none;
    }

    .back {
      text-align: center;
      margin: 30px;
    }

    .floating-cart {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      color: black;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <h1>PRODUCT DETAILS</h1>

  <div class="container">

    <div class="card">

      <!-- IMAGE WITH OVERLAY -->
      <div style="position: relative;">

<img id="mainImage" class="main-img" src="">
        
  <!-- LEFT BUTTON -->
  <div id="prevBtn" style="
    position: absolute;
    top: 50%;
    left: 10px;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 8px 12px;
    cursor: pointer;
  ">
    ←
  </div>

  <!-- RIGHT BUTTON -->
  <div id="nextBtn" style="
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 8px 12px;
    cursor: pointer;
  ">
    →
  </div>

  <!-- ADD TO CART BUTTON (keep yours here) -->
  <div id="addToCartBtn" style="
    position: absolute;
    top: 15px;
    right: 15px;
    background: white;
    color: black;
    padding: 8px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
  ">
    + Cart
  </div>

</div>

      </div>

      <!-- DETAILS -->
      <h2 id="productName" style="
  margin-top:20px;
  margin-bottom:10px;
  font-weight:500;
  letter-spacing:1px;
  font-size:20px;
"></h2>
      <p id="productPrice" style="
  margin:5px 0;
  font-size:16px;
  font-weight:600;
"></p>
      <p id="productSize" style="
  margin:5px 0 15px 0;
  font-size:13px;
  letter-spacing:1px;
  opacity:0.7;
"></p>

      <!-- BUTTONS -->
    <div class="buttons" id="actionButtons" style="margin-top:20px;"></div>
   
    <div class="gallery"></div>

    </div>

  </div>

  <div class="back">
    <a href="index.html" style="color:white;">← Back to Home</a>
  </div>

  <!-- FLOATING CART -->
  <div id="cartBtn" class="floating-cart">
    Cart (0) 🛒
  </div>

  <!-- SCRIPT -->
<script>

const SUPABASE_URL = "https://tyvbwwccwcgkafueroui.supabase.co";
const SUPABASE_KEY = "sb_publishable_tKeUN6N774CqR8YucuDwSw_U35gepAu";

async function loadProduct() {

  const params = new URLSearchParams(window.location.search);
  const productId = params.get("id");
 if (!productId) {
  return;
}
 
if (!productId) {
  window.location.href = "index.html";
  return;
}
  const response = await fetch(`${SUPABASE_URL}/rest/v1/products?id=eq.${productId}`, {
    headers: {
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`
    }
  });

 const data = await response.json();

if (!data || data.length === 0) {
  document.getElementById("productName").innerText = "Product not found";
  return;
}

const product = data[0];
  // SET DATA
  document.getElementById("productName").innerText = product.name;
  document.getElementById("productPrice").innerText = "Price: " + product.price;
  document.getElementById("productSize").innerText = "Size: " + product.size;
 
  document.getElementById("productSize").innerHTML += `
  <p style="
  font-size:11px;
  color:#ff4d4d;
  margin-top:8px;
  letter-spacing:1px;
  border:1px solid #ff4d4d;
  display:inline-block;
  padding:4px 8px;
">
  ONLY ONE PIECE LEFT
</p>
`;

 const message = `Hi, I want to buy this item:

Name: ${product.name}
Price: ₹${product.price}
Size: ${product.size}

Is this still available?

If yes, please reserve it for me.`; 
const encodedMessage = encodeURIComponent(message);

const whatsappLink = `https://wa.me/919370820852?text=${encodedMessage}`;

const buttons = document.getElementById("actionButtons");

buttons.innerHTML = `
  <a href="${whatsappLink}" target="_blank"
     style="
       display:inline-block;
       padding:12px 20px;
       background:white;
       color:black;
       text-decoration:none;
       font-size:14px;
       letter-spacing:1px;
       margin-top:10px;
     ">
    BUY ON WHATSAPP
  </a>

  <button id="payBtn"
    style="
      display:inline-block;
      padding:12px 20px;
      background:#000;
      color:#fff;
      border:none;
      font-size:14px;
      letter-spacing:1px;
      margin-top:10px;
      margin-left:10px;
      cursor:pointer;
    ">
    PAY NOW
  </button>
`;
let images = [];

if (product.images) {
  try {
    images = JSON.parse(product.images.trim());
  } catch (e) {
    images = [product.images];
  }
}

let currentIndex = 0;

const mainImage = document.getElementById("mainImage");

// show first image
if (images.length > 0) {
  mainImage.src = images[0];
}

// NEXT BUTTON →
document.getElementById("nextBtn").addEventListener("click", () => {
  currentIndex = (currentIndex + 1) % images.length;
  mainImage.src = images[currentIndex];
});

// PREVIOUS BUTTON ←
document.getElementById("prevBtn").addEventListener("click", () => {
  currentIndex = (currentIndex - 1 + images.length) % images.length;
  mainImage.src = images[currentIndex];
});

// GALLERY
const gallery = document.querySelector(".gallery");
gallery.innerHTML = "";

images.forEach((img, index) => {
  const imageEl = document.createElement("img");
  imageEl.src = img;

  imageEl.addEventListener("click", () => {
    currentIndex = index;
    mainImage.src = images[currentIndex];
  });

  gallery.appendChild(imageEl);
});
}
 
loadProduct();

</script>
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</body>
