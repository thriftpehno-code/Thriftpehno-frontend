<!DOCTYPE html>
<html>
<head>
  <title>Pants - Thrift Pehno</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    h1 {
      text-align: center;
      padding: 30px;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 20px;
    }

    .card {
      border: 1px solid white;
      padding: 20px;
    }

    .main-img {
  width: 100%;
  aspect-ratio: 4 / 5;
  object-fit: contain;
  background: black;
}

    .gallery {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      margin-top: 20px;
    }

    .gallery img {
      height: 100px;
    }

    .buttons {
      margin-top: 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .buttons a {
      border: 1px solid white;
      padding: 8px 15px;
      color: white;
      text-decoration: none;
    }

    .back {
      text-align: center;
      margin: 30px;
    }

    .floating-cart {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: white;
      color: black;
      padding: 12px 20px;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }

  </style>

</head>

<body>

  <h1>PANTS COLLECTION</h1>

  <div class="container">

    <div class="card">

      <!-- IMAGE WITH OVERLAY -->
      <div style="position: relative;">

<img id="mainImage" class="main-img" src="">
        
  <!-- LEFT BUTTON -->
  <div id="prevBtn" style="
    position: absolute;
    top: 50%;
    left: 10px;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 8px 12px;
    cursor: pointer;
  ">
    ←
  </div>

  <!-- RIGHT BUTTON -->
  <div id="nextBtn" style="
    position: absolute;
    top: 50%;
    right: 10px;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.6);
    color: white;
    padding: 8px 12px;
    cursor: pointer;
  ">
    →
  </div>

  <!-- ADD TO CART BUTTON (keep yours here) -->
  <div id="addToCartBtn" style="
    position: absolute;
    top: 15px;
    right: 15px;
    background: white;
    color: black;
    padding: 8px 12px;
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
  ">
    + Cart
  </div>

</div>

      </div>

      <!-- DETAILS -->
      <h2 id="productName"></h2>
<p id="productPrice"></p>
<p id="productSize"></p>

      <!-- BUTTONS -->
      <div class="buttons">

        <a href="https://wa.me/919370820852?text=Hi%20I%20want%20to%20buy%20Diesel%20Industrial%20Denim%20(Size%2034-35)%20for%20₹2499.%20https://www.instagram.com/p/DVJdJx4DLOg/">
          Buy on WhatsApp
        </a>

        <a href="https://www.instagram.com/p/DVJdJx4DLOg/" target="_blank">
          View on Instagram
        </a>

      </div>

      <!-- GALLERY -->
      <div class="gallery">

        <img src="https://i.postimg.cc/4Nyy6Ygm/1776084635463-publer-com.jpg">
        <img src="https://i.postimg.cc/xTZCt9f5/1776084636438-publer-com.jpg">
        <img src="https://i.postimg.cc/Wby3XsNY/1776084637448-publer-com.jpg">
        <img src="https://i.postimg.cc/65qqr8X6/1776084638440-publer-com.jpg">
        <img src="https://i.postimg.cc/J7PtHb9t/1776084639442-publer-com.jpg">

      </div>

    </div>

  </div>

  <div class="back">
    <a href="index.html" style="color:white;">← Back to Home</a>
  </div>

  <!-- FLOATING CART -->
  <div id="cartBtn" class="floating-cart">
    Cart (0) 🛒
  </div>

  <!-- SCRIPT -->
<script>

document.addEventListener("DOMContentLoaded", function () {

  // 🧠 PRODUCT DATABASE
  const products = {
    1: {
      id: "diesel-denim-1",
      name: "Diesel Industrial Denim",
      price: "₹2499",
      size: "34-35",
      images: [
        "https://i.postimg.cc/W1J4yxtj/1776084634437-publer-com.jpg",
        "https://i.postimg.cc/4Nyy6Ygm/1776084635463-publer-com.jpg",
        "https://i.postimg.cc/xTZCt9f5/1776084636438-publer-com.jpg"
      ]
    },

    2: {
      id: "Pioneer-denim-1",
      name: " Premium Pioneer grey denim",
      price: "₹599",
      size: "37-38",
      images: [
        "https://i.postimg.cc/HxtS95MK/1776176893297-publer-com.jpg",
        "https://i.postimg.cc/k4C1Sw2f/1776176894291-publer-com.jpg",
        "https://i.postimg.cc/V6wGt4J6/1776176895293-publer-com.jpg",
        "https://i.postimg.cc/cJwk6PLg/1776176896295-publer-com.jpg",
        "https://i.postimg.cc/HLXvjFks/1776176897294-publer-com.jpg",
        "https://i.postimg.cc/fbmqk1TP/1776176898297-publer-com.jpg",
        "https://i.postimg.cc/NjWPsQYS/1776176899296-publer-com.jpg",
        "https://i.postimg.cc/CxW6hwYQ/1776176900297-publer-com.jpg",
        "https://i.postimg.cc/pLg1WPx7/1776176901296-publer-com.jpg",
        "https://i.postimg.cc/RZjbSv9Y/1776176902294-publer-com.jpg"
      ]
    }
  };

  // 🎯 GET PRODUCT FROM URL
  const params = new URLSearchParams(window.location.search);
  const productId = params.get("id") || "1";
  const product = products[productId];

  // 🎯 SET TEXT
  document.getElementById("productName").innerText = product.name;
  document.getElementById("productPrice").innerText = "Price: " + product.price;
  document.getElementById("productSize").innerText = "Size: " + product.size;

  // 🎯 IMAGE
  let currentIndex = 0;
  const mainImage = document.getElementById("mainImage");

  mainImage.src = product.images[0];

  const prevBtn = document.getElementById("prevBtn");
  const nextBtn = document.getElementById("nextBtn");

  nextBtn.addEventListener("click", () => {
    currentIndex = (currentIndex + 1) % product.images.length;
    mainImage.src = product.images[currentIndex];
  });

  prevBtn.addEventListener("click", () => {
    currentIndex = (currentIndex - 1 + product.images.length) % product.images.length;
    mainImage.src = product.images[currentIndex];
  });

  // 🛒 CART (same as before)
  let cart = JSON.parse(localStorage.getItem("cart")) || [];

  const addBtn = document.getElementById("addToCartBtn");
  const cartBtn = document.getElementById("cartBtn");

  cartBtn.innerText = "Cart (" + cart.length + ") 🛒";

  const alreadyAdded = cart.find(item => item.id === product.id);

  if (alreadyAdded) {
    addBtn.innerText = "Added ✓";
    addBtn.style.background = "green";
    addBtn.style.color = "white";
  }

  addBtn.addEventListener("click", () => {

    const exists = cart.find(item => item.id === product.id);

    if (exists) {
      alert("Already added");
      return;
    }

    cart.push(product);
    localStorage.setItem("cart", JSON.stringify(cart));

    cartBtn.innerText = "Cart (" + cart.length + ") 🛒";

    addBtn.innerText = "Added ✓";
    addBtn.style.background = "green";
    addBtn.style.color = "white";
  });

});

</script>
</body>
</html>
